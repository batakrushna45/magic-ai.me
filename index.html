<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAGIC AI Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #FF6B00;
      --orange-lite: #FF8C38;
      --orange-dim:  #7A3300;
      --bg:          #0A0A0A;
      --surface:     #111111;
      --surface2:    #1A1A1A;
      --surface3:    #222222;
      --border:      #2A2A2A;
      --text:        #F0F0F0;
      --muted:       #888888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    /* Header */
    header {
      width: 100%;
      max-width: 680px;
      text-align: center;
      margin-bottom: 36px;
    }
    .logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .logo-icon {
      width: 44px; height: 44px;
      background: var(--orange); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
    }
    .logo-text { font-size: 26px; font-weight: 800; }
    .logo-text span { color: var(--orange); }
    header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* Card */
    .card {
      width: 100%; max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--orange); margin-bottom: 18px;
    }

    /* Search row + autocomplete wrapper */
    .search-wrap { position: relative; }
    .search-row { display: flex; gap: 10px; }

    /* Autocomplete dropdown */
    .autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 80px; /* leave space for button */
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .autocomplete-list.hidden { display: none; }
    .ac-item {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.active { background: var(--orange-dim); }
    .ac-id   { font-size: 13px; font-weight: 700; color: var(--orange-lite); }
    .ac-name { font-size: 12px; color: var(--muted); }
    .ac-loading { padding: 10px 14px; color: var(--muted); font-size: 13px; }

    /* Inputs */
    input[type="text"], input[type="email"] {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--orange); }
    input::placeholder { color: var(--muted); }

    /* Buttons */
    button {
      cursor: pointer; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700;
      padding: 11px 22px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--orange); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--orange-lite); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--orange); }

    /* Info grid */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .info-grid { grid-template-columns: 1fr; } }
    .info-item { display: flex; flex-direction: column; gap: 3px; }
    .info-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); }
    .info-value { font-size: 15px; font-weight: 500; }
    .badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
      background: var(--orange-dim); color: var(--orange-lite);
    }

    /* Form */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .form-actions { display: flex; gap: 10px; margin-top: 4px; }

    /* Rows notice */
    .rows-notice {
      font-size: 12px; color: var(--muted); margin-bottom: 18px;
      padding: 8px 12px; background: var(--surface2);
      border-radius: 6px; border-left: 3px solid var(--orange-dim);
    }

    /* Alerts */
    .alert { border-radius: 8px; padding: 11px 14px; font-size: 14px; margin-bottom: 16px; }
    .alert-error   { background: #2D0A0A; border: 1px solid #7F1D1D; color: #FCA5A5; }
    .alert-success { background: #052E16; border: 1px solid #14532D; color: #86EFAC; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

    /* Footer */
    footer { margin-top: 40px; color: var(--muted); font-size: 12px; text-align: center; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">M</div>
      <div class="logo-text"><span>MAGIC</span> AI Portal</div>
    </div>
    <p>Look up your IR details and update your email &amp; referrer information</p>
  </header>

  <!-- Search Card -->
  <div class="card">
    <div class="card-title">🔍 Search by IR ID</div>
    <div id="searchAlert" class="alert hidden"></div>

    <div class="search-wrap">
      <div class="search-row">
        <input
          id="searchInput"
          type="text"
          placeholder="Type your IR ID (e.g. IN109895)"
          maxlength="30"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="searchBtn" class="btn-primary" onclick="doSearch()">Search</button>
      </div>

      <!-- Autocomplete dropdown -->
      <div id="acList" class="autocomplete-list hidden"></div>
    </div>
  </div>

  <!-- Results Card -->
  <div id="resultsCard" class="card hidden">
    <div class="card-title">📋 Your IR Details</div>
    <div id="rowsNotice" class="rows-notice hidden"></div>
    <div id="infoGrid" class="info-grid"></div>

    <hr class="divider" />

    <div class="card-title">✏️ Update Your Details</div>
    <div id="updateAlert" class="alert hidden"></div>

    <div class="form-group">
      <label class="form-label" for="emailInput">Email Address</label>
      <input id="emailInput" type="email" placeholder="you@example.com" />
      <span class="form-hint">Leave blank to keep existing value</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="referrerInput">Referrer IR ID</label>
      <input id="referrerInput" type="text" placeholder="e.g. IN000001" maxlength="30" spellcheck="false" />
      <span class="form-hint">Leave blank to keep existing value</span>
    </div>

    <div class="form-actions">
      <button id="saveBtn" class="btn-primary" onclick="doUpdate()">Save Details</button>
      <button class="btn-secondary" onclick="resetAll()">Search Again</button>
    </div>
  </div>

  <footer>MAGIC AI Genealogy Portal &mdash; Data is read directly from Google Sheets</footer>

  <script>
    // ── CONFIG ── Paste your Apps Script Web App URL here ────
    var APPS_SCRIPT_URL = 'PASTE_YOUR_WEB_APP_URL_HERE';
    // ─────────────────────────────────────────────────────────

    var currentIrId = '';
    var callbackIdx = 0;
    var acDebounce  = null;
    var acActiveIdx = -1;

    // ── AUTOCOMPLETE ─────────────────────────────────────────
    var searchInput = document.getElementById('searchInput');
    var acList      = document.getElementById('acList');

    searchInput.addEventListener('input', function() {
      var val = searchInput.value.trim().toUpperCase();
      clearTimeout(acDebounce);
      if (val.length < 3) { hideAC(); return; }
      acDebounce = setTimeout(function() { fetchSuggestions(val); }, 400);
    });

    searchInput.addEventListener('keydown', function(e) {
      var items = acList.querySelectorAll('.ac-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        acActiveIdx = Math.min(acActiveIdx + 1, items.length - 1);
        highlightAC(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        acActiveIdx = Math.max(acActiveIdx - 1, -1);
        highlightAC(items);
      } else if (e.key === 'Enter') {
        if (acActiveIdx >= 0 && items[acActiveIdx]) {
          items[acActiveIdx].click();
        } else {
          doSearch();
        }
      } else if (e.key === 'Escape') {
        hideAC();
      }
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('.search-wrap')) hideAC();
    });

    function fetchSuggestions(prefix) {
      if (APPS_SCRIPT_URL === 'PASTE_YOUR_WEB_APP_URL_HERE') return;
      showACLoading();
      jsonp(APPS_SCRIPT_URL, { action: 'autocomplete', prefix: prefix }, function(res) {
        if (!res.results || res.results.length === 0) { hideAC(); return; }
        renderAC(res.results);
      });
    }

    function showACLoading() {
      acList.innerHTML = '<div class="ac-loading">Searching…</div>';
      acList.classList.remove('hidden');
      acActiveIdx = -1;
    }

    function renderAC(results) {
      acList.innerHTML = '';
      acActiveIdx = -1;
      results.forEach(function(r) {
        var item = document.createElement('div');
        item.className = 'ac-item';
        item.innerHTML =
          '<span class="ac-id">' + esc(r.ir_id) + '</span>' +
          '<span class="ac-name">' + esc(r.name) + '</span>';
        item.addEventListener('click', function() {
          searchInput.value = r.ir_id;
          hideAC();
          doSearch();
        });
        acList.appendChild(item);
      });
      acList.classList.remove('hidden');
    }

    function highlightAC(items) {
      items.forEach(function(el, i) {
        el.classList.toggle('active', i === acActiveIdx);
      });
    }

    function hideAC() {
      acList.classList.add('hidden');
      acList.innerHTML = '';
      acActiveIdx = -1;
    }

    // ── SEARCH ───────────────────────────────────────────────
    function doSearch() {
      var rawId = searchInput.value.trim().toUpperCase();
      clearAlert('searchAlert');
      hideAC();

      if (!rawId || rawId.length < 2) {
        showAlert('searchAlert', 'error', 'Please enter a valid IR ID.');
        return;
      }
      if (APPS_SCRIPT_URL === 'PASTE_YOUR_WEB_APP_URL_HERE') {
        showAlert('searchAlert', 'error', '⚠️ Setup needed: paste your Apps Script Web App URL into index.html.');
        return;
      }

      setSearchLoading(true);
      jsonp(APPS_SCRIPT_URL, { action: 'search', ir_id: rawId }, function(res) {
        setSearchLoading(false);
        if (res.error) { showAlert('searchAlert', 'error', res.error); return; }
        if (!res.found) {
          showAlert('searchAlert', 'error', 'No record found for "' + rawId + '". Please check and try again.');
          return;
        }
        currentIrId = rawId;
        renderResults(res.data, res.allRows || [res.data]);
      });
    }

    // ── RENDER RESULTS ───────────────────────────────────────
    function renderResults(primary, allRows) {
      var grid = document.getElementById('infoGrid');
      grid.innerHTML = '';

      [
        { label: 'IR ID',           value: primary.ir_id },
        { label: 'Full Name',        value: primary.name },
        { label: 'Level',            value: primary.level, badge: true },
        { label: 'Left / Right',     value: primary.left_right || '—' },
        { label: 'BV',               value: primary.bv },
        { label: 'RSP Total',        value: primary.rsp_total },
        { label: 'Parent IR ID',     value: primary.parent_ir_id || '—' },
        { label: 'Parent Name',      value: primary.parent_name  || '—' },
        { label: 'Direct Downlines', value: primary.direct_downlines },
        { label: 'Source',           value: primary.source || '—' },
      ].forEach(function(f) {
        var item = document.createElement('div');
        item.className = 'info-item';
        item.innerHTML =
          '<span class="info-label">' + esc(f.label) + '</span>' +
          (f.badge
            ? '<span class="badge">'      + esc(f.value) + '</span>'
            : '<span class="info-value">' + esc(f.value) + '</span>');
        grid.appendChild(item);
      });

      var notice = document.getElementById('rowsNotice');
      if (allRows.length > 1) {
        notice.textContent = 'ℹ️ ' + allRows.length + ' rows share this IR ID (TC variants). Saving will update all of them.';
        notice.classList.remove('hidden');
      } else {
        notice.classList.add('hidden');
      }

      document.getElementById('emailInput').value    = primary.email          || '';
      document.getElementById('referrerInput').value = primary.referrer_ir_id || '';

      clearAlert('updateAlert');
      document.getElementById('resultsCard').classList.remove('hidden');
      document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── UPDATE ───────────────────────────────────────────────
    function doUpdate() {
      var email    = document.getElementById('emailInput').value.trim();
      var referrer = document.getElementById('referrerInput').value.trim().toUpperCase();
      clearAlert('updateAlert');

      if (!email && !referrer) {
        showAlert('updateAlert', 'error', 'Please enter at least an email or a referrer IR ID.');
        return;
      }
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showAlert('updateAlert', 'error', 'Please enter a valid email address.');
        return;
      }

      setSaveLoading(true);
      jsonp(APPS_SCRIPT_URL, { action: 'update', ir_id: currentIrId, email: email, referrer: referrer }, function(res) {
        setSaveLoading(false);
        if (res.error) { showAlert('updateAlert', 'error', res.error); return; }
        showAlert('updateAlert', 'success', '✅ ' + (res.message || 'Saved successfully!'));
      });
    }

    // ── JSONP ─────────────────────────────────────────────────
    function jsonp(url, params, callback) {
      var cbName = '__mpCb' + (++callbackIdx) + '_' + Date.now();
      var timer;

      window[cbName] = function(data) {
        clearTimeout(timer);
        delete window[cbName];
        try { document.head.removeChild(script); } catch(e) {}
        callback(data);
      };

      params.callback = cbName;
      var qs = Object.keys(params)
        .map(function(k) { return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]); })
        .join('&');

      var script = document.createElement('script');
      script.src = url + '?' + qs;
      script.onerror = function() {
        clearTimeout(timer);
        delete window[cbName];
        try { document.head.removeChild(script); } catch(e) {}
        callback({ error: 'Network error. Check your Apps Script URL and deployment settings.' });
      };

      timer = setTimeout(function() {
        if (window[cbName]) {
          delete window[cbName];
          try { document.head.removeChild(script); } catch(e) {}
          callback({ error: 'Request timed out. The sheet may still be loading — please try again.' });
        }
      }, 30000); // 30 second timeout

      document.head.appendChild(script);
    }

    // ── UI Helpers ────────────────────────────────────────────
    function showAlert(id, type, msg) {
      var el = document.getElementById(id);
      el.className = 'alert alert-' + type;
      el.textContent = msg;
      el.classList.remove('hidden');
    }
    function clearAlert(id) {
      var el = document.getElementById(id);
      el.classList.add('hidden');
      el.textContent = '';
    }
    function setSearchLoading(on) {
      document.getElementById('searchBtn').disabled = on;
      document.getElementById('searchInput').disabled = on;
      document.getElementById('searchBtn').innerHTML = on ? '<span class="spinner"></span>Searching…' : 'Search';
    }
    function setSaveLoading(on) {
      var btn = document.getElementById('saveBtn');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Saving…' : 'Save Details';
    }
    function resetAll() {
      document.getElementById('resultsCard').classList.add('hidden');
      searchInput.value = '';
      clearAlert('searchAlert');
      clearAlert('updateAlert');
      currentIrId = '';
      hideAC();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
